[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pgsql",
    "php83Extensions.pdo",
    "php83Extensions.mbstring",
    "php83Extensions.tokenizer",
    "php83Extensions.xml",
    "php83Extensions.ctype",
    "php83Extensions.fileinfo",
    "php83Extensions.curl",
    "php83Extensions.intl",
    "php83Extensions.zip",
    "composer",
    "nodejs_20"
]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"